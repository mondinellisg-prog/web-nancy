<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nancy delos Santos | Galería de Arte & Talleres</title>
    
    <!-- Fuentes de Lujo -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --gold: #c5a059;
            --dark: #121212;
            --light: #f9f9f9;
            --white: #ffffff;
            --shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        body {
            font-family: 'Lato', sans-serif;
            background-color: var(--light);
            color: var(--dark);
            margin: 0;
            overflow-x: hidden;
        }

        /* --- HEADER --- */
        header {
            height: 50vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: radial-gradient(circle at center, #ffffff 0%, #ececec 100%);
            padding: 20px;
        }

        header h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            margin: 0;
            letter-spacing: 5px;
            text-transform: uppercase;
        }

        header p {
            font-style: italic;
            color: #666;
            max-width: 600px;
            font-size: 1.1rem;
            margin-top: 10px;
        }

        /* --- TABS --- */
        .tabs-nav {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin: 40px 0;
        }

        .tab-btn {
            background: none;
            border: none;
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            cursor: pointer;
            color: #999;
            padding-bottom: 8px;
            border-bottom: 2px solid transparent;
            transition: 0.3s;
        }

        .tab-btn.active {
            color: var(--dark);
            border-bottom: 2px solid var(--gold);
        }

        /* --- SLIDER DE OBRAS (INFINITO) --- */
        .slider-section {
            position: relative;
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 60px;
        }

        .slider-wrapper {
            overflow: hidden;
            padding: 20px 0;
        }

        .gallery-container {
            display: flex;
            gap: 30px;
            transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1);
            cursor: pointer;
        }

        .artwork-card {
            flex: 0 0 320px;
            background: var(--white);
            padding: 15px;
            box-shadow: var(--shadow);
            text-align: center;
            transition: 0.4s;
        }

        .artwork-card:hover {
            transform: scale(1.03);
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
        }

        .artwork-card img {
            width: 100%;
            height: 400px;
            object-fit: cover;
            border: 1px solid #f0f0f0;
        }

        .artwork-card h3 {
            font-family: 'Playfair Display', serif;
            margin: 15px 0 5px;
            font-size: 1.2rem;
        }

        /* Botones del Slider */
        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: var(--white);
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            cursor: pointer;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: 0.3s;
        }

        .nav-btn:hover {
            background: var(--gold);
            color: white;
        }

        .prev-btn { left: 0; }
        .next-btn { right: 0; }

        /* --- TALLERES --- */
        .talleres-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            padding: 0 8%;
            margin-bottom: 80px;
        }

        .taller-card {
            background: var(--white);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: 0.3s;
        }

        .taller-card:hover { transform: translateY(-5px); }

        .taller-card img { width: 100%; height: 250px; object-fit: cover; }
        
        .taller-content { padding: 25px; }

        .btn-action {
            display: block;
            background: var(--dark);
            color: var(--white);
            text-decoration: none;
            padding: 14px;
            text-align: center;
            border-radius: 4px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.8rem;
            transition: 0.3s;
        }

        .btn-action:hover { background: var(--gold); }

        /* --- LIGHTBOX (PANTALLA COMPLETA) --- */
        #lightbox {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            flex-direction: column;
            user-select: none;
        }

        #lightbox.active { display: flex; }

        .lb-image-container {
            position: relative;
            max-width: 90%;
            max-height: 80vh;
        }

        #lightbox-img {
            max-width: 100%;
            max-height: 80vh;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            animation: zoomIn 0.3s ease;
        }

        .lb-info {
            color: white;
            text-align: center;
            margin-top: 20px;
        }

        .lb-info h2 { font-family: 'Playfair Display'; margin: 0; color: var(--gold); }

        .lb-close {
            position: absolute;
            top: 30px; right: 30px;
            color: white; font-size: 2.5rem; cursor: pointer;
            z-index: 10001;
        }

        .lb-nav {
            position: absolute;
            top: 50%; width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 40px;
            box-sizing: border-box;
            pointer-events: none;
        }

        .lb-btn {
            background: none; border: none;
            color: white; font-size: 3.5rem; cursor: pointer;
            pointer-events: auto;
            opacity: 0.5; transition: 0.3s;
        }

        .lb-btn:hover { opacity: 1; color: var(--gold); }

        @keyframes zoomIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body>

<header>
    <h1 id="hero-title">Nancy de los Santos</h1>
    <p id="hero-desc">Explorando la sensibilidad a través del color y la forma</p>
</header>

<div class="tabs-nav">
    <button class="tab-btn active" onclick="openTab(event, 'obras')">Obras</button>
    <button class="tab-btn" onclick="openTab(event, 'talleres')">Talleres</button>
</div>

<!-- SECCIÓN OBRAS -->
<section id="obras" class="tab-content active">
    <div class="slider-section">
        <button class="nav-btn prev-btn" onclick="moveSlider(-1)"><i class="fas fa-chevron-left"></i></button>
        <div class="slider-wrapper">
            <div class="gallery-container" id="gallerySlider"></div>
        </div>
        <button class="nav-btn next-btn" onclick="moveSlider(1)"><i class="fas fa-chevron-right"></i></button>
    </div>
</section>

<!-- SECCIÓN TALLERES -->
<section id="talleres" class="tab-content">
    <div class="talleres-grid" id="talleresGrid"></div>
</section>

<!-- LIGHTBOX MODAL -->
<div id="lightbox">
    <span class="lb-close" onclick="closeLightbox()">&times;</span>
    
    <div class="lb-nav">
        <button class="lb-btn" onclick="changeImage(-1)"><i class="fas fa-angle-left"></i></button>
        <button class="lb-btn" onclick="changeImage(1)"><i class="fas fa-angle-right"></i></button>
    </div>

    <div class="lb-image-container">
        <img id="lightbox-img" src="" alt="Zoom">
    </div>

    <div class="lb-info">
        <h2 id="lb-title">Título</h2>
        <p id="lb-tech">Técnica</p>
        <a id="lb-wa" href="#" target="_blank" class="btn-action" style="display:inline-block; padding: 10px 30px;">Consultar por WhatsApp</a>
    </div>
</div>

<script>
    let obrasData = [];
    let currentIdx = 0;
    let sliderPos = 0;

    async function loadData() {
        try {
            const resp = await fetch('./data.json');
            const data = await resp.json();
            obrasData = data.obras;

            document.getElementById('hero-title').innerText = data.hero_title;
            document.getElementById('hero-desc').innerText = data.hero_desc;

            // Render Obras
            const gallery = document.getElementById('gallerySlider');
            obrasData.forEach((obra, index) => {
                const card = document.createElement('div');
                card.className = 'artwork-card';
                card.onclick = () => openLightbox(index);
                card.innerHTML = `
                    <img src="${obra.image}" alt="${obra.title}">
                    <h3>${obra.title}</h3>
                    <p style="color:#888; font-size:0.9rem">${obra.tech}</p>
                `;
                gallery.appendChild(card);
            });

            // Render Talleres
            const workshops = document.getElementById('talleresGrid');
            data.talleres.forEach(t => {
                workshops.innerHTML += `
                    <div class="taller-card">
                        <img src="${t.image}">
                        <div class="taller-content">
                            <h3 style="font-family:'Playfair Display'; margin-top:0;">${t.title}</h3>
                            <p style="color:#666; font-size:0.95rem; height:60px; overflow:hidden;">${t.desc}</p>
                            <a href="https://wa.me/5491134564126?text=Hola Nancy, quiero info del taller: ${t.title}" class="btn-action">Consultar Taller</a>
                        </div>
                    </div>
                `;
            });
        } catch (e) { console.error("Error al cargar datos", e); }
    }

    // Lógica del Slider
    function moveSlider(direction) {
        const container = document.getElementById('gallerySlider');
        const cardWidth = 350; // ancho + gap
        const maxScroll = container.scrollWidth - container.parentElement.offsetWidth;
        
        sliderPos += direction * cardWidth;

        // Infinito simple: si llega al final, vuelve al inicio
        if (sliderPos > maxScroll + 100) sliderPos = 0;
        if (sliderPos < 0) sliderPos = maxScroll;

        container.style.transform = `translateX(-${sliderPos}px)`;
    }

    // Lógica Lightbox
    function openLightbox(index) {
        currentIdx = index;
        updateLightbox();
        document.getElementById('lightbox').classList.add('active');
        document.body.style.overflow = 'hidden'; // Bloquea scroll fondo
    }

    function closeLightbox() {
        document.getElementById('lightbox').classList.remove('active');
        document.body.style.overflow = 'auto';
    }

    function changeImage(step) {
        currentIdx = (currentIdx + step + obrasData.length) % obrasData.length;
        updateLightbox();
    }

    function updateLightbox() {
        const obra = obrasData[currentIdx];
        const img = document.getElementById('lightbox-img');
        img.style.opacity = '0';
        
        setTimeout(() => {
            img.src = obra.image;
            document.getElementById('lb-title').innerText = obra.title;
            document.getElementById('lb-tech').innerText = obra.tech;
            document.getElementById('lb-wa').href = `https://wa.me/5491134564126?text=Hola Nancy, me interesa la obra: ${obra.title}`;
            img.style.opacity = '1';
        }, 200);
    }

    // Teclado para Lightbox
    document.addEventListener('keydown', (e) => {
        if (!document.getElementById('lightbox').classList.contains('active')) return;
        if (e.key === 'ArrowRight') changeImage(1);
        if (e.key === 'ArrowLeft') changeImage(-1);
        if (e.key === 'Escape') closeLightbox();
    });

    // Pestañas
    function openTab(evt, tabName) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabName).classList.add('active');
        evt.currentTarget.classList.add('active');
    }

    loadData();
</script>

</body>
</html>
